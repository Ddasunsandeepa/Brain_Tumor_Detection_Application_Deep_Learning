<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="mb-4">📊 Your Prediction History</h2>

    <a href="/" class="btn btn-primary mb-3">⬅ Back</a>

    <div class="row">
        {% for item in data %}
        <div class="col-md-4 mb-4">
            <div class="card p-3 shadow">

                <img src="/{{ item[0] }}" class="img-fluid mb-2">

                <h5>{{ item[1] }}</h5>
                <p>Confidence: {{ (item[2]*100)|round(2) }}%</p>
                <small class="text-muted">{{ item[3] }}</small>
                <a href="/download_report?image={{ item[0] }}&result={{ item[1] }}&confidence={{ item[2] }}&date={{ item[3] }}"
                class="btn btn-success mt-2">
                📄 Download Report
                </a>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
