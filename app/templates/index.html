<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Brain Tumor Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    height: 100vh;
    transition: 0.3s;
}

/* .dark-mode {
    background: #121212;
    color: white;
} */

.dark-mode::after {
    background: rgba(0, 0, 0, 0.7);
}

.dark-mode .card {
    background: rgba(30, 30, 30, 0.85);
    color: white;
}
.dark-mode .bg-image {
    filter: blur(6px) brightness(0.5);
}

.card {
    border-radius: 20px;
    padding: 30px;
    width: 400px;
    text-align: center;
    background: rgba(255, 255, 255, 0.85); /* glass effect */
    backdrop-filter: blur(10px); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.drop-zone {
    border: 2px dashed #aaa;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 15px;
}

.drop-zone.dragover {
    background: #e0ffe0;
}

.spinner {
    display: none;
}

/* Fix layout after navbar */
.main-container {
    height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Fix body (remove center flex) */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
}

.bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* 🔥 key */
    filter: blur(6px);
    opacity: 0.6;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0, 0, 0, 0.4);

    z-index: -1;
}

</style>
</head>

<body>
  <img src="{{ url_for('static', filename='assets/img2.jpg') }}" class="bg-image">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <span class="navbar-brand">🧠 AI Diagnosis</span>

    <div class="ms-auto">
        {% if session.username %}
            <!-- <span class="text-white me-3">Welcome, {{ session.username }}</span> -->
             <span class="badge bg-info text-dark me-3">
                👤 {{ session.username }}
            </span>
            <a href="/dashboard" class="btn btn-warning btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-primary btn-sm me-2">Login</a>
            <a href="/register" class="btn btn-success btn-sm">Register</a>
        {% endif %}
    </div>
</nav>

<!-- 🔥 MAIN CENTER CARD -->
<div class="main-container">

    <div class="card">

        <h3>🧠 AI Brain Tumor Detection</h3>
        <p>Upload MRI Scan</p>

        <!-- 🌙 Dark Mode -->
        <button class="btn btn-sm btn-dark mb-2" onclick="toggleDark()">🌙 Toggle Dark</button>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form id="uploadForm" action="/predict" method="post" enctype="multipart/form-data">

            <div class="drop-zone" id="dropZone">
                Drag & Drop Image Here<br>or Click to Select
                <input type="file" name="file" id="fileInput" hidden required>
            </div>

            <div class="spinner" id="spinner">
                <div class="spinner-border text-success"></div>
                <p>Analyzing MRI...</p>
            </div>

            <button class="btn btn-success mt-2">🔍 Analyze</button>

        </form>
    </div>

</div>
<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const form = document.getElementById("uploadForm");
const spinner = document.getElementById("spinner");

// Click → open file picker
dropZone.onclick = () => fileInput.click();

// Drag events
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    dropZone.classList.remove("dragover");
});

// Show spinner on submit
form.addEventListener("submit", () => {
    spinner.style.display = "block";
});

// Dark mode toggle
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
