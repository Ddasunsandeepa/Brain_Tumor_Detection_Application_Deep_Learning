<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diagnosis Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #ffffff);
}

/* Main Card */
.container-box {
    margin-top: 40px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0px 15px 40px rgba(0,0,0,0.15);
}

/* Title */
.result-title {
    font-weight: 700;
}

/* Status Badge */
.status {
    font-size: 22px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 30px;
    display: inline-block;
}

.no-tumor {
    background: #d4edda;
    color: #155724;
}

.tumor {
    background: #f8d7da;
    color: #721c24;
}

/* Confidence bar */
.progress {
    height: 20px;
    border-radius: 10px;
}

.progress-bar {
    font-weight: bold;
}

/* Images */
.img-box {
    transition: 0.3s;
}

.img-box:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    max-width: 350px;
    border-radius: 15px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
}

/* Fade animation */
.fade-in {
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Button */
.btn-back {
    margin-top: 30px;
    padding: 10px 25px;
    border-radius: 30px;
}
</style>
</head>

<body>

<div class="container fade-in">
    <div class="container-box text-center">

        <!-- Title -->
        <h2 class="result-title">🧠 AI Diagnosis Result</h2>

        <!-- Status -->
        {% if "No Tumor" in result %}
            <div class="status no-tumor mt-3">✔ No Tumor Detected</div>
        {% else %}
            <div class="status tumor mt-3">⚠ {{ result }}</div>
        {% endif %}

        <!-- Confidence -->
        <div class="mt-4">
            <h6>Confidence Level</h6>
            <div class="progress">
                <div class="progress-bar bg-success" style="width: {{ confidence }}%">
                    {{ confidence }}%
                </div>
            </div>
        </div>

        <!-- Images -->
        <div class="row mt-5">
            <div class="col-md-6">
                <h5>🖼 Original MRI</h5>
                <div class="img-box">
                    <img src="/{{ image_path }}">
                </div>
            </div>

            <div class="col-md-6">
                <h5>🔥 Model Attention (Grad-CAM)</h5>
                <div class="img-box">
                    <img src="/{{ heatmap_path }}">
                </div>
            </div>
        </div>

        <!-- Button -->
        <a href="/" class="btn btn-primary btn-back">⬅ Try Another Scan</a>

    </div>
</div>

</body>
</html>
